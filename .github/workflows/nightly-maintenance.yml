name: Nightly Maintenance

on:
  schedule:
    - cron: '0 1 * * *'
      timezone: Europe/Oslo
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update historical statuses
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/nightly-maintenance.mjs

  publish:
    needs: maintain
    uses: ./.github/workflows/build-site.yml
    secrets: inherit