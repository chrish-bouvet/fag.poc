name: Validate Event

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate issue payload
        run: |
          mkdir -p .tmp
          node scripts/validate-event.mjs --event-file "$GITHUB_EVENT_PATH" --write-json .tmp/validation.json

      - name: Sync labels and comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('.tmp/validation.json', 'utf8'));
            const issue = context.payload.issue;
            const currentLabels = issue.labels.map((label) => label.name);
            const statusLabels = [
              'status:invalid',
              'status:needs-review',
              'status:approved',
              'status:historical',
              'status:cancelled'
            ];

            let nextLabels;
            if (currentLabels.includes('status:cancelled')) {
              nextLabels = currentLabels;
            } else {
              nextLabels = currentLabels.filter((label) => !statusLabels.includes(label));
              nextLabels.push(result.status);
            }

            if (!nextLabels.includes('source:issue-form')) {
              nextLabels.push('source:issue-form');
            }

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: Array.from(new Set(nextLabels))
            });

            const body = result.valid
              ? [
                  'Validation passed.',
                  '',
                  'Issue is ready for admin review and has been marked with `status:needs-review`.'
                ].join('\n')
              : [
                  'Validation failed.',
                  '',
                  ...result.errors.map((error) => `- ${error}`)
                ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body
            });